<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PURO TABACO — Wireframes</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0eee9; }
  .sketch { font-family: 'Caveat', cursive; }
</style>
</head>
<body>
<script type="text/babel">


// ── Sketch primitives ──────────────────────────────────────────
const S = {
  dark: '#2a2a2a',
  mid: '#666',
  light: '#bbb',
  xlight: '#ddd',
  green: '#30483A',
  tan: '#C8B08A',
  cream: '#EFE6D6',
  bronze: '#8B7355',
  accent: '#C8B08A'
};

// Hatched placeholder image box
function ImgBox({ w, h, label, bg = '#e8e4de', style = {} }) {
  const id = `hatch_${Math.random().toString(36).slice(2, 7)}`;
  return (
    <svg width={w} height={h} style={{ display: 'block', flexShrink: 0, ...style }}>
      <defs>
        <pattern id={id} width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="8" stroke="#ccc" strokeWidth="1" />
        </pattern>
      </defs>
      <rect width={w} height={h} fill={bg} />
      <rect width={w} height={h} fill={`url(#${id})`} opacity="0.5" />
      {label && <text x={w / 2} y={h / 2 + 5} textAnchor="middle" fontFamily="Caveat,cursive" fontSize="13" fill="#888">{label}</text>}
    </svg>);

}

function Box({ w, h, bg = '#fff', border = '#bbb', r = 2, children, style = {} }) {
  return <div style={{ width: w, height: h, background: bg, border: `1.5px solid ${border}`, borderRadius: r, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden', flexShrink: 0, ...style }}>{children}</div>;
}

function Pill({ label, bg = '#2a2a2a', color = '#fff', small }) {
  return <div style={{ display: 'inline-block', background: bg, color, fontFamily: 'Caveat,cursive', fontSize: small ? 11 : 13, padding: small ? '2px 8px' : '4px 12px', borderRadius: 3, letterSpacing: 1, whiteSpace: 'nowrap' }}>{label}</div>;
}

function Label({ children, size = 13, bold, color = S.dark, style = {} }) {
  return <div style={{ fontFamily: 'Caveat,cursive', fontSize: size, fontWeight: bold ? 700 : 400, color, lineHeight: 1.3, ...style }}>{children}</div>;
}

function HRule({ color = '#bbb', my = 8 }) {
  return <div style={{ height: 1, background: color, margin: `${my}px 0` }} />;
}

function NavBar({ bg = S.dark, items = ['INICIO', 'CATÁLOGO', 'MARCAS', 'CONTACTO'], cta, logo }) {
  return (
    <div style={{ background: bg, padding: '10px 20px', display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
      <div style={{ fontFamily: 'Caveat,cursive', fontSize: 16, fontWeight: 700, color: '#EFE6D6', marginRight: 'auto', display: 'flex', alignItems: 'center', gap: 6 }}>
        {logo && <svg width="20" height="24" viewBox="0 0 20 24"><path d="M10 1 L19 5 L19 13 C19 18 14 22 10 23 C6 22 1 18 1 13 L1 5 Z" fill="none" stroke="#C8B08A" strokeWidth="1.5" /><text x="10" y="14" textAnchor="middle" fontFamily="Caveat,cursive" fontSize="5" fill="#C8B08A">EST</text><text x="10" y="19" textAnchor="middle" fontFamily="Caveat,cursive" fontSize="4" fill="#C8B08A">1902</text></svg>}
        PURO TABACO
      </div>
      {items.map((i) => <Label key={i} size={11} color="#C8B08A">{i}</Label>)}
      {cta && <Pill label={cta} bg={S.bronze} small />}
    </div>);

}

// ══════════════════════════════════════════════════════════════
// WIREFRAME A — "Clásica Columnar" — Hero full-width + columnas
// ══════════════════════════════════════════════════════════════
function WireA() {
  return (
    <div style={{ width: 360, background: '#faf9f7', border: '1.5px solid #ccc', borderRadius: 3, overflow: 'hidden' }}>
      <NavBar logo cta="ACCESO MAYORISTAS" />
      <div style={{ height: 1, background: S.tan }} />

      {/* Hero */}
      <div style={{ background: S.green, padding: '28px 20px', position: 'relative', overflow: 'hidden' }}>
        <ImgBox w={320} h={110} label="fondo vintage / Big Ben tabaco" bg="#243830" style={{ position: 'absolute', top: 0, left: 0, opacity: 0.5 }} />
        <div style={{ position: 'relative', zIndex: 1 }}>
          <Label size={9} color={S.tan} style={{ letterSpacing: 2, marginBottom: 4 }}>MAYORISTA DE TABACO PREMIUM</Label>
          <Label size={22} bold color={S.tan} style={{ lineHeight: 1.1, marginBottom: 8 }}>TRADICIÓN<br />QUE MUEVE<br />NEGOCIOS</Label>
          <Label size={11} color="#EFE6D6" style={{ marginBottom: 14 }}>Desde 1902, conectando empresas<br />con tabaco premium de calidad mundial.</Label>
          <div style={{ display: 'flex', gap: 8 }}>
            <Pill label="SOLICITAR CATÁLOGO" bg={S.bronze} />
            <Pill label="VER MARCAS" bg="transparent" color={S.tan} />
          </div>
        </div>
      </div>

      {/* 4 valores */}
      <div style={{ background: '#faf9f7', padding: '16px 20px' }}>
        <Label size={14} bold color={S.dark} style={{ marginBottom: 10, textAlign: 'center' }}>¿POR QUÉ PURO TABACO?</Label>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {[['◷', 'Herencia', '120 años de tradición'], ['🤝', 'Confianza', 'Marcas certificadas'], ['★', 'Calidad', 'Productos originales'], ['✓', 'Eficiencia', 'Despachos en 2-3 días']].map(([ico, t, d]) =>
          <div key={t} style={{ border: '1.5px solid #ddd', borderRadius: 2, padding: '8px 10px', background: '#fff', borderLeft: `3px solid ${S.tan}` }}>
              <Label size={16} style={{ marginBottom: 2 }}>{ico}</Label>
              <Label size={12} bold color={S.dark}>{t}</Label>
              <Label size={10} color={S.mid}>{d}</Label>
            </div>
          )}
        </div>
      </div>

      {/* Marcas */}
      <div style={{ background: S.green, padding: '16px 20px' }}>
        <Label size={11} bold color='#fff' style={{ textAlign: 'center', marginBottom: 12, letterSpacing: 1 }}>DISTRIBUIDORES CERTIFICADOS</Label>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
          {['Dunhill', 'Mac Baren', 'Davidoff', 'Marlboro', 'Pueblo'].map((m) =>
          <div key={m} style={{ border: '1.5px solid #C8B08A80', borderRadius: 2, padding: '5px 10px' }}>
              <Label size={11} color={S.tan}>{m}</Label>
            </div>
          )}
        </div>
      </div>

      {/* Ventajas cards */}
      <div style={{ background: S.cream, padding: '16px 20px' }}>
        <Label size={13} bold color={S.dark} style={{ marginBottom: 10, textAlign: 'center' }}>VENTAJAS MAYORISTA</Label>
        {['STOCK PERMANENTE', 'PRECIOS MAYORISTAS', 'DESPACHOS RÁPIDOS', 'ATENCIÓN PERSONALIZADA'].map((v) =>
        <div key={v} style={{ background: '#faf9f7', border: '1.5px solid #ddd', borderLeft: `3px solid ${S.tan}`, padding: '7px 10px', marginBottom: 6, borderRadius: 2 }}>
            <Label size={12} bold color={S.dark}>{v}</Label>
            <Label size={10} color={S.mid}>descripción breve del beneficio...</Label>
          </div>
        )}
      </div>

      {/* How it works */}
      <div style={{ background: '#faf9f7', padding: '16px 20px' }}>
        <Label size={13} bold color={S.dark} style={{ marginBottom: 10, textAlign: 'center' }}>CÓMO FUNCIONA</Label>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, justifyContent: 'center' }}>
          {['1\nSOLICITAR', '2\nREVISAR', '3\nENCARGAR', '4\nRECIBIR'].map((s, i) =>
          <React.Fragment key={i}>
              <div style={{ textAlign: 'center', flex: 1 }}>
                <div style={{ width: 28, height: 28, borderRadius: '50%', background: S.green, margin: '0 auto 4px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Label size={12} bold color='#fff'>{i + 1}</Label>
                </div>
                <Label size={10} color={S.mid} style={{ whiteSpace: 'pre' }}>{s.split('\n')[1]}</Label>
              </div>
              {i < 3 && <div style={{ height: 1, width: 12, background: S.tan, flexShrink: 0 }} />}
            </React.Fragment>
          )}
        </div>
      </div>

      {/* CTA Final */}
      <div style={{ background: S.green, padding: '20px', textAlign: 'center' }}>
        <Label size={14} bold color='#fff' style={{ marginBottom: 6, lineHeight: 1.2 }}>¿LISTO PARA EL<br />SIGUIENTE NIVEL?</Label>
        <Label size={10} color='#EFE6D6' style={{ marginBottom: 12 }}>Más de 120 años de experiencia mayorista</Label>
        <div style={{ marginBottom: 8 }}><Pill label="SOLICITAR ACCESO MAYORISTA" bg={S.bronze} /></div>
        <Label size={11} color={S.tan}>📱 +56 9 1234 5678</Label>
      </div>

      {/* Footer */}
      <div style={{ background: '#1a1a1a', padding: '12px 20px' }}>
        <div style={{ display: 'flex', gap: 16, marginBottom: 8, flexWrap: 'wrap' }}>
          {['Catálogo', 'Marcas', 'Contacto', 'Términos'].map((l) => <Label key={l} size={10} color={S.tan}>{l}</Label>)}
        </div>
        <HRule color='#333' my={4} />
        <Label size={10} color='#666'>© 2026 Puro Tabaco — Est. 1902</Label>
      </div>
    </div>);

}

// ══════════════════════════════════════════════════════════════
// WIREFRAME B — "Split Hero" — Mitad imagen / mitad texto

function WireB() {
  return (
    <div style={{ width: 360, background: '#faf9f7', border: '1.5px solid #ccc', borderRadius: 3, overflow: 'hidden' }}>

      <div style={{ height: 1, background: S.tan }} />

      <div style={{ display: 'flex', height: 160 }}>

      </div>

      {/* Tagline band */}
      <div style={{ background: S.cream, padding: '10px 20px', textAlign: 'center', borderTop: `2px solid ${S.tan}`, borderBottom: `2px solid ${S.tan}` }}>

      </div>

      {/* 3 col valores */}
      <div style={{ background: '#faf9f7', padding: '14px 20px' }}>

          {[['◷', 'Herencia'], ['★', 'Calidad'], ['✓', 'Eficiencia']].map(([ico, t]) =>
          <div key={t} style={{ textAlign: 'center', padding: '10px 6px', border: `1.5px solid ${S.xlight}`, borderRadius: 2, background: '#fff' }}>

              <Label size={9} color={S.mid}>lorem ipsum...</Label>
            </div>
          )}

      </div>

      {/* Marcas dark */}
      <div style={{ background: S.green, padding: '14px 20px' }}>
        <Label size={11} bold color='#fff' style={{ letterSpacing: 1, marginBottom: 10, textAlign: 'center' }}>MARCAS LÍDERES</Label>
        <div style={{ display: 'flex', gap: 6, justifyContent: 'center' }}>
          {['Dunhill', 'Mac Baren', 'Davidoff', 'Marlboro'].map((m) =>
          <Box key={m} w={66} h={28} bg="transparent" border="#C8B08A50">
              <Label size={10} color={S.tan}>{m}</Label>
            </Box>
          )}
        </div>
      </div>

      {/* Ventajas 2 col */}
      <div style={{ background: S.cream, padding: '14px 20px' }}>
        <Label size={13} bold color={S.dark} style={{ marginBottom: 10, textAlign: 'center' }}>VENTAJAS</Label>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {['STOCK PERMANENTE', 'PRECIOS MAYORISTAS', 'DESPACHOS 2-3 DÍAS', 'AUTENTICIDAD 100%'].map((v) =>
          <div key={v} style={{ background: '#fff', border: `1.5px solid ${S.xlight}`, borderTop: `3px solid ${S.tan}`, padding: '8px 10px', borderRadius: 2 }}>
              <Label size={11} bold color={S.dark}>{v}</Label>
              <Label size={9} color={S.mid}>beneficio clave</Label>
            </div>
          )}
        </div>
      </div>

      {/* Clientes */}
      <div style={{ background: '#faf9f7', padding: '14px 20px' }}>
        <Label size={12} bold color={S.dark} style={{ marginBottom: 8 }}>¿QUIÉNES COMPRAN?</Label>
        {['Distribuidoras', 'Locales de detalle', 'Gastronomía', 'Mayoristas'].map((c) =>
        <div key={c} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}>
            <div style={{ width: 14, height: 14, border: `1.5px solid ${S.tan}`, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Label size={9} color={S.tan}>✓</Label>
            </div>
            <Label size={11} color={S.dark}>{c}</Label>
          </div>
        )}
      </div>

      {/* CTA */}
      <div style={{ background: S.green, padding: '16px 20px', textAlign: 'center' }}>
        <Label size={13} bold color='#fff' style={{ marginBottom: 8 }}>¿LISTO PARA CRECER?</Label>
        <div style={{ marginBottom: 6 }}><Pill label="ACCESO MAYORISTA" bg={S.bronze} /></div>
        <Label size={11} color={S.tan}>💬 WhatsApp +56 9 1234 5678</Label>
      </div>

      {/* Footer */}
      <div style={{ background: '#1a1a1a', padding: '10px 20px' }}>
        <Label size={10} color={S.tan} style={{ marginBottom: 4 }}>PURO TABACO</Label>
        <Label size={9} color='#555'>© 2026 — Mayorista de Tabaco Premium. Est. 1902</Label>
      </div>
    </div>);

}

// ══════════════════════════════════════════════════════════════
function WireC() {
  return (
    <div style={{ width: 360, background: '#faf9f7', border: '1.5px solid #ccc', borderRadius: 3, overflow: 'hidden' }}>

      {/* Banda estadísticas */}

function WireD() {
  return (
    <div style={{ width: 360, background: '#faf9f7', border: '1.5px solid #ccc', borderRadius: 3, overflow: 'hidden' }}>
      {/* Nav: clean line */}
      <div style={{ background: '#fff', padding: '10px 20px', display: 'flex', alignItems: 'center', borderBottom: `3px solid ${S.green}` }}>
        <div style={{ marginRight: 'auto' }}>
          <Label size={15} bold color={S.green}>PURO TABACO</Label>
          <Label size={8} color={S.tan} style={{ letterSpacing: 1 }}>EST. 1902</Label>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          {['CATÁLOGO', 'MARCAS', 'CONTACTO'].map((i) => <Label key={i} size={9} color={S.dark}>{i}</Label>)}

      </div>

      {/* Hero: texto centrado con borde decorativo */}

      <div style={{ background: '#fff', padding: '12px 20px' }}>
        <Label size={11} bold color={S.dark} style={{ marginBottom: 8 }}>¿QUIÉNES NOS ELIGEN?</Label>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
          {['Distribuidoras', 'Locales de detalle', 'Gastronomía', 'Mayoristas'].map((c) =>

      {/* CTA */}

      <div style={{ background: '#1a1a1a', padding: '12px 20px' }}>

            {['Catálogo', 'Marcas', 'Contacto'].map((l) => <Label key={l} size={9} color='#555' style={{ marginBottom: 3 }}>{l}</Label>)}

        </div>
        <HRule color='#333' my={4} />
        <Label size={9} color='#444'>© 2026 Puro Tabaco — Est. 1902</Label>
      </div>
    </div>);

}

// ── Post-its de anotaciones ────────────────────────────────────
function Annotation({ text, rotate = 0 }) {
  return (
    <div style={{
      background: '#FEF08A', padding: '10px 12px', width: 160, borderRadius: 2,
      fontFamily: 'Caveat,cursive', fontSize: 13, color: '#4a3a00', lineHeight: 1.4,
      boxShadow: '2px 3px 8px rgba(0,0,0,0.15)', transform: `rotate(${rotate}deg)`
    }}>{text}</div>);

}
