<script type="text/babel">

const S = {
  dark: '#2a2a2a', mid: '#666', light: '#bbb', xlight: '#ddd',
  green: '#30483A', tan: '#C8B08A', cream: '#EFE6D6',
  bronze: '#8B7355', accent: '#C8B08A',
};

function ImgBox({ w, h, label, bg = '#e8e4de', style = {} }) {
  const id = `h${Math.random().toString(36).slice(2,7)}`;
  return (
    <svg width={w} height={h} style={{ display:'block', flexShrink:0, ...style }}>
      <defs>
        <pattern id={id} width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="8" stroke="#ccc" strokeWidth="1"/>
        </pattern>
      </defs>
      <rect width={w} height={h} fill={bg}/>
      <rect width={w} height={h} fill={`url(#${id})`} opacity="0.5"/>
      {label && <text x={w/2} y={h/2+5} textAnchor="middle" fontFamily="Caveat,cursive" fontSize="12" fill="#888">{label}</text>}
    </svg>
  );
}
function Box({ w, h, bg='#fff', border='#bbb', r=2, children, style={} }) {
  return <div style={{ width:w, height:h, background:bg, border:`1.5px solid ${border}`, borderRadius:r, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', flexShrink:0, ...style }}>{children}</div>;
}
function Pill({ label, bg='#2a2a2a', color='#fff', small }) {
  return <div style={{ display:'inline-block', background:bg, color, fontFamily:'Caveat,cursive', fontSize:small?10:12, padding:small?'2px 7px':'4px 11px', borderRadius:3, letterSpacing:1, whiteSpace:'nowrap' }}>{label}</div>;
}
function Label({ children, size=13, bold, color=S.dark, style={} }) {
  return <div style={{ fontFamily:'Caveat,cursive', fontSize:size, fontWeight:bold?700:400, color, lineHeight:1.3, ...style }}>{children}</div>;
}
function HRule({ color='#bbb', my=8 }) {
  return <div style={{ height:1, background:color, margin:`${my}px 0` }}/>;
}
function NavBar({ bg=S.dark, items=['INICIO','CATÁLOGO','MARCAS','CONTACTO'], cta, logo }) {
  return (
    <div style={{ background:bg, padding:'8px 16px', display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
      <div style={{ fontFamily:'Caveat,cursive', fontSize:14, fontWeight:700, color:'#EFE6D6', marginRight:'auto', display:'flex', alignItems:'center', gap:5 }}>
        {logo && <svg width="16" height="20" viewBox="0 0 20 24"><path d="M10 1 L19 5 L19 13 C19 18 14 22 10 23 C6 22 1 18 1 13 L1 5 Z" fill="none" stroke="#C8B08A" strokeWidth="1.5"/><text x="10" y="14" textAnchor="middle" fontFamily="Caveat,cursive" fontSize="5" fill="#C8B08A">EST</text><text x="10" y="19" textAnchor="middle" fontFamily="Caveat,cursive" fontSize="4" fill="#C8B08A">1902</text></svg>}
        PURO TABACO
      </div>
      {items.map(i => <Label key={i} size={9} color="#C8B08A">{i}</Label>)}
      {cta && <Pill label={cta} bg={S.bronze} small/>}
    </div>
  );
}

function Annotation({ text, rotate=0 }) {
  return (
    <div style={{ background:'#FEF08A', padding:'9px 11px', borderRadius:2, fontFamily:'Caveat,cursive', fontSize:13, color:'#4a3a00', lineHeight:1.4, boxShadow:'2px 3px 8px rgba(0,0,0,0.13)', transform:`rotate(${rotate}deg)`, transformOrigin:'top left' }}>
      {text}
    </div>
  );
}

function PageHeader({ title, subtitle, num }) {
  return (
    <div className="page-header">
      <span className="page-title">{title}</span>
      <span className="page-subtitle">{subtitle}</span>
      <span className="page-num">{num}</span>
    </div>
  );
}

// ── Scale wrapper: renders the wireframe at a given CSS scale ──
function Scaled({ children, scale=0.75 }) {
  return (
    <div style={{ flexShrink:0 }}>
      <div style={{ transform:`scale(${scale})`, transformOrigin:'top left', display:'inline-block' }}>
        {children}
      </div>
    </div>
  );
}
