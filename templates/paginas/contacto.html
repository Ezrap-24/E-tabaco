{% extends 'base.html' %}
{% block title %}Contacto — e-Tabaco{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <h1 class="section-title mb-4">Contacto</h1>
      {% if enviado %}
      <div class="alert alert-success">¡Mensaje enviado! Te responderemos pronto.</div>
      {% else %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" name="nombre" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Mensaje</label>
          <textarea name="mensaje" class="form-control" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-gold w-100">Enviar mensaje</button>
      </form>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
